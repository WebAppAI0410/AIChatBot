<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --text-color: #333;
      --bg-color: #fff;
      --primary-color: #007aff;
    }
    body {
      margin: 0;
      color: var(--text-color);
      background: var(--bg-color);
      -webkit-user-select: none;
      user-select: none;
    }
    #editor {
      padding: 12px;
      min-height: 100vh;
      outline: none;
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/core@2/dist/tiptap-core.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2/dist/tiptap-starter-kit.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-underline@2/dist/tiptap-extension-underline.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-highlight@2/dist/tiptap-extension-highlight.umd.min.js"></script>
  <script>
    const { Editor } = window['@tiptap/core'];
    const StarterKit = window['@tiptap/starter-kit'].default;
    const Underline = window['@tiptap/extension-underline'].default;
    const Highlight = window['@tiptap/extension-highlight'].default;

    const editor = new Editor({
      element: document.querySelector('#editor'),
      extensions: [StarterKit, Underline, Highlight],
      content: '',
      onUpdate() {
        sendContent();
        sendHistory();
      }
    });

    function sendContent() {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'contentChange', content: editor.getHTML() }));
    }
    function sendHistory() {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'historyState', canUndo: editor.can().undo(), canRedo: editor.can().redo() }));
    }
    function updateTheme(colors) {
      if(!colors) return;
      if(colors.text) document.documentElement.style.setProperty('--text-color', colors.text);
      if(colors.background) document.documentElement.style.setProperty('--bg-color', colors.background);
      if(colors.primary) document.documentElement.style.setProperty('--primary-color', colors.primary);
    }
    function exec(cmd, val) {
      const chain = editor.chain().focus();
      switch(cmd){
        case 'toggleBold': chain.toggleBold().run(); break;
        case 'toggleItalic': chain.toggleItalic().run(); break;
        case 'toggleUnderline': chain.toggleUnderline().run(); break;
        case 'toggleStrike': chain.toggleStrike().run(); break;
        case 'toggleHeading': chain.toggleHeading({ level: val }).run(); break;
        case 'toggleBulletList': chain.toggleBulletList().run(); break;
        case 'toggleOrderedList': chain.toggleOrderedList().run(); break;
        case 'toggleBlockquote': chain.toggleBlockquote().run(); break;
        case 'toggleHighlight': chain.toggleHighlight().run(); break;
        case 'undo': chain.undo().run(); break;
        case 'redo': chain.redo().run(); break;
      }
      sendHistory();
      sendContent();
    }
    function handleMessage(event){
      try {
        const data = JSON.parse(event.data);
        if(data.type === 'setContent'){ editor.commands.setContent(data.content || ''); sendHistory(); }
        else if(data.type === 'exec'){ exec(data.command, data.value); }
        else if(data.type === 'updateTheme'){ updateTheme(data.colors); }
        else if(data.type === 'init'){ editor.commands.setContent(data.content || ''); updateTheme(data.colors); sendHistory(); }
      }catch(e){ console.error(e); }
    }
    window.addEventListener('message', handleMessage);
    document.addEventListener('message', handleMessage);
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));
  </script>
</body>
</html>
