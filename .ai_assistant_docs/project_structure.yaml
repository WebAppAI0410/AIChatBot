project_structure:
  app:
    description: "メインアプリケーションコード"
    sub_directories:
      tabs: "タブベースのナビゲーション画面"
      notes: "ノート一覧・ノート編集（Apple純正ノート風UI/UX、AIアシスト付き）"
      components:
        note: "ノート機能専用コンポーネント（エディタ、AIアシスト、部分選択AIアシスト、タグ管理など分割設計）"
      config: "アプリ設定"
      constants: "定数定義"
      hooks: "カスタムReactフック"
      providers: "コンテキストプロバイダー"
      services: "APIなどの外部サービス連携"
      settings: "設定画面関連"
      store: "状態管理（Zustand）"
      temp: "一時ファイル（開発用）"
      ui: "UIユーティリティとコンポーネント"
      utils: "ユーティリティ関数"
  
  store:
    description: "状態管理（Zustand）"
    key_files:
      - noteStore.ts: "ノート・フォルダ・タグ・AIアシストの状態管理（自動保存・一括編集対応）"
      - userStore.ts: "ユーザー情報・プラン・クォータ管理"
  
  services:
    description: "外部APIとの連携"
    key_files:
      - api.ts: "AIアシストAPI呼び出し、ノート・タグ管理API"
      - sqlite.ts: "expo-sqliteによるローカルDB管理"
  
  components:
    description: "再利用可能なUIコンポーネント"
    sub_directories:
      note: "ノート機能専用（エディタ、AIアシスト、タグ管理、差分表示など）"
    key_components:
      - note/WebViewEditor.tsx: "WYSIWYGエディタ（タップ編集・自動保存、テキスト選択アクションバブル）"
      - note/NoteAIAssist.tsx: "AIアシスト（質問/編集モード切替、チャットUI）"
      - note/PartialEditAIAssist.tsx: "テキスト部分選択AIアシスト（選択範囲の編集・整形に特化）"
      - note/TagSelector.tsx: "タグ管理・一括編集・タグ名変更"
      - note/DiffViewer.tsx: "AI編集提案の差分表示"
  
  assets:
    description: "アセットファイル"
    key_directories:
      - editor: "WebViewエディタ用HTML/CSS/JS（テキスト選択アクションバブル含む）"
  
  supabase:
    description: "バックエンド機能実装（Edge Functions）"
    key_directories:
      - functions: "サーバーレス関数"
      - .temp: "一時ファイル" 